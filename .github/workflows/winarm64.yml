# Temporary workflow for iterating on the Windows ARM64 CI job on the
# windows-arm64-ci branch.  Once green, this job moves into build.yml
# and this file is deleted.

name: Windows ARM64

on:
  push:
    branches: [ windows-arm64-ci ]
  workflow_dispatch:

jobs:
  build-msvc-arm64:
    name: Windows ARM64 Visual C++
    runs-on: windows-11-arm

    steps:
      - run: git config --global core.autocrlf input
      - uses: actions/checkout@v4

      # Cygwin has no native ARM64 build; the x64 install runs under
      # Windows' x64 emulation.  The compilers it drives (cl/armasm64
      # from the amd64_arm64 cross tools) are also x64-hosted, and the
      # ARM64 binaries they produce execute natively on this runner.
      - uses: egor-tensin/setup-cygwin@v4
        with:
          platform: x64
          packages: wget make dejagnu automake autoconf libtool texinfo unzip dos2unix

      - uses: ilammy/msvc-dev-cmd@v1.13.0
        with:
          arch: amd64_arm64

      - name: Build and test
        shell: C:\tools\cygwin\bin\bash.exe --login --norc -eo pipefail -o igncr '{0}'
        run: |
          cd $(cygpath $RUNNER_WORKSPACE)/libffi
          curl -fsSL --retry 3 "https://github.com/atgreen/red-light-green-light/releases/download/v2.0.4/rlgl-2.0.4-windows-amd64.zip" -o rlgl.zip
          unzip -o rlgl.zip
          chmod +x rlgl.exe
          autoreconf -f -v -i
          ./configure \
            --enable-shared \
            --build=aarch64-w64-mingw32 --host=aarch64-w64-mingw32 \
            --disable-docs \
            CC="$(pwd)/msvcc.sh -marm64" \
            CXX="$(pwd)/msvcc.sh -marm64" \
            LD="link" \
            LDFLAGS="-no-undefined" \
            CPP="cl -nologo -EP" \
            CXXCPP="cl -nologo -EP" \
            CPPFLAGS="-DFFI_BUILDING_DLL -DUSE_STATIC_RTL" \
            CFLAGS="-DFFI_BUILDING_DLL -DUSE_STATIC_RTL" \
            AR='$(pwd)/.ci/ar-lib lib' \
            NM='dumpbin -symbols' STRIP=':' || { cat */config.log; exit 1; }
          make
          find ./ -type f -name 'libffi*'
          ls -l */.libs
          cp $(find . -name 'libffi-?.dll') aarch64-w64-mingw32/testsuite/
          TERM=none DEJAGNU=$(pwd)/.ci/site.exp BOARDSDIR=$(pwd)/.ci GCC_COLORS= make check || true
          ./rlgl.exe e \
                          -l project=libffi \
                          -l sha=${GITHUB_SHA:0:7} \
                          -l CC=msvcc.sh \
                          -l host=aarch64-w64-mingw32 \
                          --policy=https://github.com/libffi/rlgl-policy.git $(find . -name libffi.log)

      - name: Upload test logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: winarm64-test-logs
          path: |
            **/testsuite/libffi.log
            **/testsuite/libffi.sum
            rlgl-report*
          if-no-files-found: ignore
