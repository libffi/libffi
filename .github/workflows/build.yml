name: CI

# Controls when the action will run.
on:
  # Triggers the workflow on push or pull request events but only for the master branch
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# A workflow run is made up of one or more jobs that can run sequentially or in parallel
jobs:
  build-linux:
    name: Linux ${{ matrix.HOST }} ${{ matrix.CONFIGURE_OPTIONS }} \
          ${{ matrix.MEVAL }} ${{ matrix.LIBFFI_TEST_OPTIMIZATION }}

    runs-on: ${{ matrix.runner }}

    strategy:
      fail-fast: false
      matrix:
        include:
          # ---------- existing x86-64 variants ----------
          - runner: ubuntu-latest
            HOST:  x86_64-pc-linux-gnu
            MEVAL: 'export CC=clang CXX=clang++'

          - runner: ubuntu-latest
            HOST:  i386-pc-linux-gnu
            MEVAL: 'export CC="gcc -m32" CXX="g++ -m32"'

          - runner: ubuntu-latest
            HOST:  x86_64-pc-linux-gnu
            CONFIGURE_OPTIONS: "--disable-shared"

          - runner: ubuntu-latest
            HOST:  x86_64-pc-linux-gnu
            CONFIGURE_OPTIONS: "--enable-shared"

          - runner: ubuntu-latest
            HOST:  x86_64-pc-linux-gnu
            CONFIGURE_OPTIONS: "--disable-exec-static-tramp"

          # ---------- new native arm64 build ----------
          - runner: ubuntu-22.04-arm     # or ubuntu-24.04-arm
            HOST:  aarch64-unknown-linux-gnu
            MEVAL: 'export CC=clang CXX=clang++'

    steps:
      - uses: actions/checkout@v4

      - env:
          MEVAL: ${{ matrix.MEVAL }}
          HOST: ${{ matrix.HOST }}
          LDFLAGS: ${{ matrix.LDFLAGS }}
          RUNTESTFLAGS: ${{ matrix.RUNTESTFLAGS }}
          CONFIGURE_OPTIONS: ${{ matrix.CONFIGURE_OPTIONS }}
          QEMU_LD_PREFIX: ${{ matrix.QEMU_LD_PREFIX }}
          QEMU_CPU: ${{ matrix.QEMU_CPU }}
        run: |
          if test x"$MEVAL" != x; then eval ${MEVAL}; fi
          ./.ci/install.sh
          ./.ci/build.sh

      - name: Upload rlgl report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: rlgl-report-${{ github.job }}-${{ strategy.job-index }}
          path: rlgl-report.html
          if-no-files-found: ignore

      - name: rlgl report link
        if: always()
        run: echo "::notice title=rlgl report::https://libffi.github.io/libffi/reports/${{ github.run_id }}/${{ github.job }}-${{ strategy.job-index }}/"

  build-macos:
    name: MacOS ${{ matrix.platform }} ${{ matrix.compilers }}
    runs-on: ${{ matrix.platform }}

    strategy:
      fail-fast: false
      matrix:
        platform: [macos-14, macos-15]
        compilers: [CC=gcc-15 CXX=g++-15, CC=clang CXX=g++-15]

    steps:
      - run: git config --global core.autocrlf input
      - uses: actions/checkout@v4
      - run: ./.ci/install.sh
      - run: ${{ matrix.compilers }} ./.ci/build.sh

  # ----------------------------------------------------------------------------
  # x86_64 macOS coverage without an Intel runner: build x86_64 on an
  # Apple-Silicon runner (clang -arch x86_64) and run the testsuite under
  # Rosetta 2.  Exercises libffi's x86_64 calling-convention paths.
  build-macos-x86:
    name: MacOS x86_64 (Rosetta)
    runs-on: macos-14
    steps:
      - run: git config --global core.autocrlf input
      - uses: actions/checkout@v4
      - name: Install Rosetta 2
        run: softwareupdate --install-rosetta --agree-to-license || true
      - run: ./.ci/install.sh
      - name: Build x86_64 and test under Rosetta
        env:
          MACOS_X86: "1"
          HOST: x86_64-apple-darwin
          CC: clang -arch x86_64
          CXX: clang++ -arch x86_64
        run: ./.ci/build.sh
      - name: Upload rlgl report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: rlgl-report-${{ github.job }}
          path: rlgl-report.html
          if-no-files-found: ignore
      - name: rlgl report link
        if: always()
        run: echo "::notice title=rlgl report::https://libffi.github.io/libffi/reports/${{ github.run_id }}/${{ github.job }}/"

  build-non-msvc:
    name: Windows ${{ matrix.width }}-bit ${{ matrix.compiler }}
    runs-on: windows-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          # Cygwin 32-bit
          - host: i686-pc-cygwin
            width: 32
            arch: x86
            target: i686-pc-cygwin
            gcc_prefix: /usr/i686-pc-cygwin
            compiler: gcc
          - host: i686-pc-cygwin
            width: 32
            arch: x86
            target: i686-pc-cygwin
            gcc_prefix: /usr/i686-pc-cygwin
            compiler: clang
          # MinGW-w64 64-bit
          - host: x86_64-w64-mingw32
            width: 64
            arch: x64
            target: x86_64-w64-mingw32
            gcc_prefix: /usr/${{ github.workspace }}/mingw64      # unused but keeps the table homogeneous
            compiler: clang
          - host: x86_64-w64-mingw32
            width: 64
            arch: x64
            target: x86_64-w64-mingw32
            gcc_prefix: /usr/${{ github.workspace }}/mingw64      # unused but keeps the table homogeneous
            compiler: gcc

    steps:
      - run: git config --global core.autocrlf input
      - uses: actions/checkout@v4

      # ──────────────────────────────── Cygwin & tool-chains ────────────────────────────────
      - uses: egor-tensin/setup-cygwin@v4
        with:
          # gcc / g++ are needed so Clang can reuse their start-files & libraries
          packages: >
            wget make dejagnu automake autoconf libtool texinfo unzip dos2unix
            clang gcc-core gcc-g++
            cygwin32-gcc-core cygwin32-gcc-g++ cygwin32-runtime cygwin32-libgcc1

      # ──────────────────────────────── Common environment ────────────────────────────────
      - name: Export build env
        shell: bash
        run: |
          echo "GCC_PREFIX=${{ matrix.gcc_prefix }}"      >> $GITHUB_ENV
          echo "CC=${{ matrix.compiler }} --target=${{ matrix.target }} -B${{ matrix.gcc_prefix }}/bin \
                -L${{ matrix.gcc_prefix }}/lib -I${{ matrix.gcc_prefix }}/include"          >> $GITHUB_ENV
          echo "CXX=${{ matrix.compiler }} --target=${{ matrix.target }} -B${{ matrix.gcc_prefix }}/bin \
                -L${{ matrix.gcc_prefix }}/lib -I${{ matrix.gcc_prefix }}/include"          >> $GITHUB_ENV
          # make sure the cross-gcc bin dir is found *before* /usr/bin (64-bit)
          echo "${{ matrix.gcc_prefix }}/bin" >> $GITHUB_PATH

      # ──────────────────────────────── Pick version from configure.ac ─────────────────────
      - id: ver
        name: Read libffi version
        shell: C:\tools\cygwin\bin\bash.exe --login --norc -eo pipefail -o igncr '{0}'
        run: |
          cd "$(cygpath $RUNNER_WORKSPACE)/libffi"
          version=$(sed -nE 's/^AC_INIT\(\[libffi\],[[:space:]]*\[([^]]+)\].*/\1/p' configure.ac)
          [[ $version ]] || { echo "Could not parse version"; exit 1; }
          echo "version=$version" >> "$GITHUB_OUTPUT"

      # ──────────────────────────────── Build & test ───────────────────────────────────────
      - name: Build and test
        shell: C:\tools\cygwin\bin\bash.exe --login --norc -eo pipefail -o igncr '{0}'
        run: |
          set -euo pipefail
          cd "$(cygpath $RUNNER_WORKSPACE)/libffi"
          curl -fsSL --retry 3 "https://github.com/atgreen/red-light-green-light/releases/download/v2.0.4/rlgl-2.0.4-windows-amd64.zip" -o rlgl.zip
          unzip -o rlgl.zip
          chmod +x rlgl.exe
          autoreconf -fvi
          ./configure \
            --enable-shared \
            --build=${{ matrix.host }} --host=${{ matrix.host }} \
            CPPFLAGS="-DFFI_BUILDING_DLL -DUSE_STATIC_RTL" \
            CFLAGS="-DFFI_BUILDING_DLL -DUSE_STATIC_RTL"

          make
          # sanity-check
          file */.libs/*ffi-*.dll

          TERM=none DEJAGNU=$(pwd)/.ci/site.exp BOARDSDIR=$(pwd)/.ci GCC_COLORS= make check || true
          ./rlgl.exe e \
                          -l project=libffi \
                          -l sha=${GITHUB_SHA:0:7} \
                          -l CC=${{ matrix.compiler }} \
                          -l host=${{ matrix.host }} \
                          --policy=https://github.com/libffi/rlgl-policy.git $(find . -name libffi.log)

      - name: Upload rlgl report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: rlgl-report-${{ github.job }}-${{ strategy.job-index }}
          path: rlgl-report.html
          if-no-files-found: ignore

      - name: rlgl report link
        if: always()
        run: echo "::notice title=rlgl report::https://libffi.github.io/libffi/reports/${{ github.run_id }}/${{ github.job }}-${{ strategy.job-index }}/"

  build-msvc:
    name: Windows ${{ matrix.width }}-bit Visual C++
    runs-on: windows-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          - host: i686-pc-cygwin
            width: 32
            arch: x86
            tools: amd64_x86
          - host: x86_64-w64-mingw32
            width: 64
            arch: x64
            tools: amd64

    steps:
      - run: git config --global core.autocrlf input
      - uses: actions/checkout@v4
      - uses: egor-tensin/setup-cygwin@v4
        with:
          platform: x64
          packages: wget make dejagnu automake autoconf libtool texinfo unzip dos2unix
      - uses: ilammy/msvc-dev-cmd@v1.13.0
        with:
          arch: ${{ matrix.tools }}

      - name: Read libffi version from configure.ac
        id: ver
        shell: C:\tools\cygwin\bin\bash.exe --login --norc -eo pipefail -o igncr '{0}'
        run: |
          cd $(cygpath $RUNNER_WORKSPACE)/libffi
          # Pull the second bracketed field from the AC_INIT line.
          # Example line: AC_INIT([libffi],[3.5.0],[http://…])
          ls -l
          grep AC_INIT configure.ac
          ver=$(sed -nE 's/^AC_INIT\(\[libffi\],[[:space:]]*\[([^]]+)\].*/\1/p' configure.ac)
          [[ -n "$ver" ]] || { echo "Could not parse version!"; exit 1; }
          echo "version=$ver" >> "$GITHUB_OUTPUT"

      - name: Build and test
        run: |
          cd $(cygpath $RUNNER_WORKSPACE)/libffi
          curl -fsSL --retry 3 "https://github.com/atgreen/red-light-green-light/releases/download/v2.0.4/rlgl-2.0.4-windows-amd64.zip" -o rlgl.zip
          unzip -o rlgl.zip
          chmod +x rlgl.exe
          autoreconf -f -v -i
          ./configure \
            --enable-shared \
            --build="${{ matrix.host }}" --host="${{ matrix.host }}" \
            --disable-docs \
            CC="$(pwd)/msvcc.sh -m${{ matrix.width }}" \
            CXX="$(pwd)/msvcc.sh -m${{ matrix.width }}" \
            LD="link" \
            LDFLAGS="-no-undefined" \
            CPP="cl -nologo -EP" \
            CXXCPP="cl -nologo -EP" \
            CPPFLAGS="-DFFI_BUILDING_DLL -DUSE_STATIC_RTL" \
            CFLAGS="-DFFI_BUILDING_DLL -DUSE_STATIC_RTL" \
            AR='$(pwd)/.ci/ar-lib lib' \
            NM='dumpbin -symbols' STRIP=':' \
            $DEBUG_ARG || cat */config.log
          make
          find ./ -type f -name 'libffi*'
          ls -l */.libs
          cp $(find . -name 'libffi-?.dll') ${{ matrix.host }}/testsuite/
          find ./ -name ffi.h
          TERM=none DEJAGNU=$(pwd)/.ci/site.exp BOARDSDIR=$(pwd)/.ci GCC_COLORS= make check || true
          ./rlgl.exe e \
                          -l project=libffi \
                          -l sha=${GITHUB_SHA:0:7} \
                          -l CC=msvcc.sh \
                          -l host=${{ matrix.host }} \
                          --policy=https://github.com/libffi/rlgl-policy.git $(find . -name libffi.log)
        shell: C:\tools\cygwin\bin\bash.exe --login --norc -eo pipefail -o igncr '{0}'

      - name: Upload rlgl report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: rlgl-report-${{ github.job }}-${{ strategy.job-index }}
          path: rlgl-report.html
          if-no-files-found: ignore

      - name: rlgl report link
        if: always()
        run: echo "::notice title=rlgl report::https://libffi.github.io/libffi/reports/${{ github.run_id }}/${{ github.job }}-${{ strategy.job-index }}/"

      - name: Add meta information to DLL
        shell: C:\tools\cygwin\bin\bash.exe --login --norc -eo pipefail -o igncr '{0}'
        run: |
          cd $(cygpath $RUNNER_WORKSPACE)/libffi

          # Deconstruct the libffi version
          ver=${{ steps.ver.outputs.version }}
          echo "$ver"

          base=${ver%%-*}
          rc=${ver#*-}
          [[ $rc == "$ver" ]] && rc=""             # no rc?  rc=""

          maj=$(cut -d. -f1 <<<"$base")
          min=$(cut -d. -f2 <<<"$base")
          pat=$(cut -d. -f3 <<<"$base")

          # Decide on build number
          if [[ $rc =~ ^rc([0-9]+)$ ]]; then
            build=${BASH_REMATCH[1]}               # rc1 → 1
          else
            build=0
          fi

          # Use rcedit to edit the DLLs resources
          wget -O rcedit.exe https://github.com/electron/rcedit/releases/download/v2.0.0/rcedit-${{ matrix.arch }}.exe
          chmod +x ./rcedit.exe

          dll_filename=libffi-8.dll
          ./rcedit.exe "${{ matrix.host }}"/.libs/$dll_filename \
            --set-file-version "$maj.$min.$pat.$build" \
            --set-product-version "$maj.$min.$pat.$build" \
            --set-version-string "CompanyName" "https://github.com/libffi/libffi" \
            --set-version-string "FileDescription" "Portable foreign function interface library (${{ matrix.arch }})" \
            --set-version-string "ProductName" "libffi" \
            --set-version-string "FileVersion" "${{ steps.ver.outputs.version }}" \
            --set-version-string "LegalCopyright" "Copyright (c) 1996-2025 Anthony Green and others" \
            --set-version-string "OriginalFilename" "$dll_filename"

      - name: Create binary distribution
        shell: C:\tools\cygwin\bin\bash.exe --login --norc -eo pipefail -o igncr '{0}'
        run: |
          cd $(cygpath $RUNNER_WORKSPACE)/libffi
          set -euxo pipefail

          pkgdir="libffi-${{ steps.ver.outputs.version }}-x86-${{ matrix.width }}bit-msvc-binaries"
          mkdir -p "$pkgdir"

          # Copy libraries, headers, and licence into the *same* directory
          cp "${{ matrix.host }}"/.libs/libffi-8.*          "$pkgdir/"
          cp "${{ matrix.host }}"/include/*.h               "$pkgdir/"
          cp LICENSE                                        "$pkgdir/"

      - name: Upload artefact
        uses: actions/upload-artifact@v4
        with:
          name: libffi-${{ steps.ver.outputs.version }}-x86-${{ matrix.width }}bit-msvc-binaries
          path: libffi-${{ steps.ver.outputs.version }}-x86-${{ matrix.width }}bit-msvc-binaries
          if-no-files-found: error

      - name: Upload to GitHub Release
        if: github.ref_type == 'tag'
        uses: softprops/action-gh-release@v2
        with:
          files: libffi-${{ steps.ver.outputs.version }}-x86-${{ matrix.width }}bit-msvc-binaries.zip

  build-android:
    name: Android ${{ matrix.host }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        host: [armv7a-linux-androideabi, aarch64-linux-android, i686-linux-android, x86_64-linux-android]

    steps:
      - run: git config --global core.autocrlf input
      - uses: actions/checkout@v4
      - run: ./.ci/install.sh
      - env:
          HOST: ${{ matrix.HOST }}
          ANDROID_API_LEVEL: 23
          CONFIGURE_OPTIONS: "--disable-shared --disable-multi-os-directory" # fixes warning about unsupported -print-multi-os-directory with clang
        run: |
          # Relevant documentation:
          # https://developer.android.com/ndk/guides/other_build_systems
          # https://android.googlesource.com/platform/ndk/+/master/docs/BuildSystemMaintainers.md
          export TOOLCHAIN="${ANDROID_NDK_ROOT}"/toolchains/llvm/prebuilt/linux-x86_64
          export CC="${TOOLCHAIN}"/bin/${HOST}${ANDROID_API_LEVEL}-clang
          export CXX="${TOOLCHAIN}"/bin/${HOST}${ANDROID_API_LEVEL}-clang++
          export CC_FOR_TARGET="${TOOLCHAIN}"/bin/${HOST}${ANDROID_API_LEVEL}-clang
          export CXX_FOR_TARGET="${TOOLCHAIN}"/bin/${HOST}${ANDROID_API_LEVEL}-clang++
          export LD="${TOOLCHAIN}"/bin/ld.lld
          export AR="${TOOLCHAIN}"/bin/llvm-ar
          export AS="${CC}"
          export RANLIB="${TOOLCHAIN}"/bin/llvm-ranlib
          export STRIP="${TOOLCHAIN}"/bin/llvm-strip
          export NM="${TOOLCHAIN}"/bin/llvm-nm
          export OBJDUMP="${TOOLCHAIN}"/bin/llvm-objdump
          ./.ci/build.sh

      - name: Upload rlgl report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: rlgl-report-${{ github.job }}-${{ strategy.job-index }}
          path: rlgl-report.html
          if-no-files-found: ignore

      - name: rlgl report link
        if: always()
        run: echo "::notice title=rlgl report::https://libffi.github.io/libffi/reports/${{ github.run_id }}/${{ github.job }}-${{ strategy.job-index }}/"

  # ----------------------------------------------------------------------------
  # Non-native architectures tested under QEMU emulation: build + run the
  # libffi testsuite natively inside a foreign-arch container (run via QEMU
  # binfmt), then evaluate the results with rlgl on the host.  GitHub offers no
  # ppc64le/s390x/etc. runners, so emulation is the only option.  Add a matrix
  # entry (HOST + a .ci/Containerfile.<arch>) to cover more architectures.
  build-qemu:
    name: QEMU ${{ matrix.HOST }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - HOST: powerpc64le-unknown-linux-gnu
            docker_arch: ppc64le
            image: libffi-ci-ppc64le
            containerfile: .ci/Containerfile.ppc64le
          - HOST: s390x-unknown-linux-gnu
            docker_arch: s390x
            image: libffi-ci-s390x
            containerfile: .ci/Containerfile.s390x
          - HOST: riscv64-unknown-linux-gnu
            docker_arch: riscv64
            image: libffi-ci-riscv64
            containerfile: .ci/Containerfile.debian
          - HOST: arm-unknown-linux-gnueabihf
            docker_arch: arm/v7
            image: libffi-ci-armv7
            containerfile: .ci/Containerfile.debian
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU (binfmt)
        uses: docker/setup-qemu-action@v3

      - name: Build foreign-arch container image
        run: docker build --platform linux/${{ matrix.docker_arch }} -f ${{ matrix.containerfile }} -t ${{ matrix.image }} .ci

      - name: Build and test under emulation
        env:
          HOST: ${{ matrix.HOST }}
          FOREIGN_IMAGE: ${{ matrix.image }}
        run: |
          # The emulated container runs as a non-root UID and writes build
          # artifacts into the mounted workspace, so make it writable.
          chmod -R a+rwX "$GITHUB_WORKSPACE" || true
          ./.ci/install.sh
          ./.ci/build.sh

      - name: Upload rlgl report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: rlgl-report-${{ github.job }}-${{ strategy.job-index }}
          path: rlgl-report.html
          if-no-files-found: ignore

      - name: rlgl report link
        if: always()
        run: echo "::notice title=rlgl report::https://libffi.github.io/libffi/reports/${{ github.run_id }}/${{ github.job }}-${{ strategy.job-index }}/"

  # ----------------------------------------------------------------------------
  # Big-endian PowerPC variants have no ready foreign-arch container image, so
  # cross-compile with a Debian cross toolchain and run the testsuite under
  # qemu-user (binfmt).  rlgl evaluates on the host.  Add a matrix entry (HOST +
  # the gcc-<HOST> package, installed by install.sh) to cover more such targets.
  build-cross-qemu:
    name: QEMU-cross ${{ matrix.HOST }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - HOST: powerpc64-linux-gnu
          - HOST: powerpc-linux-gnu
          - HOST: sparc64-linux-gnu
          - HOST: mips64el-linux-gnuabi64
    steps:
      - uses: actions/checkout@v4

      - name: Build and test under qemu-user
        env:
          HOST: ${{ matrix.HOST }}
          CROSS_QEMU: "1"
        run: |
          ./.ci/install.sh
          ./.ci/build.sh

      - name: Upload rlgl report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: rlgl-report-${{ github.job }}-${{ strategy.job-index }}
          path: rlgl-report.html
          if-no-files-found: ignore

      - name: rlgl report link
        if: always()
        run: echo "::notice title=rlgl report::https://libffi.github.io/libffi/reports/${{ github.run_id }}/${{ github.job }}-${{ strategy.job-index }}/"

  # ----------------------------------------------------------------------------
  # Collect the rlgl HTML reports from every job above and publish them to the
  # gh-pages branch under reports/<run-id>/<job>/, regenerating an index that
  # lists all runs.  Serialized across workflows via the gh-pages-publish
  # concurrency group.  Only runs for pushes to the canonical repo.
  publish-reports:
    name: Publish rlgl reports
    needs: [build-linux, build-non-msvc, build-msvc, build-android, build-qemu, build-cross-qemu, build-macos-x86]
    if: ${{ always() && github.event_name != 'pull_request' && github.repository == 'libffi/libffi' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    concurrency:
      group: gh-pages-publish
      cancel-in-progress: false
    steps:
      - name: Download report artifacts
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          pattern: rlgl-report-*
          path: incoming

      - name: Publish reports to gh-pages
        id: publish
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          if [ ! -d incoming ] || [ -z "$(ls -A incoming 2>/dev/null)" ]; then
            echo "No rlgl reports to publish."; echo "published=false" >> "$GITHUB_OUTPUT"; exit 0
          fi
          git clone --depth 1 --branch gh-pages \
            "https://x-access-token:${GH_TOKEN}@github.com/${{ github.repository }}.git" pages
          cd pages
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          run_dir="reports/${{ github.run_id }}"
          mkdir -p "$run_dir"
          echo "${{ github.sha }}"      > "$run_dir/.sha"
          echo "${{ github.workflow }}" > "$run_dir/.workflow"
          for d in ../incoming/*/; do
            [ -d "$d" ] || continue
            key="$(basename "$d")"; key="${key#rlgl-report-}"
            if [ -f "${d}rlgl-report.html" ]; then
              mkdir -p "$run_dir/$key"
              cp "${d}rlgl-report.html" "$run_dir/$key/index.html"
            fi
          done
          {
            echo '<!doctype html><html><head><meta charset="utf-8"><title>libffi rlgl reports</title>'
            echo '<style>body{font-family:sans-serif;max-width:60em;margin:2em auto;padding:0 1em}h2{margin-top:1.5em}code{background:#f0f0f0;padding:.1em .3em}</style></head><body>'
            echo '<h1>libffi rlgl evaluation reports</h1>'
            for run in $(ls -1 reports 2>/dev/null | sort -rn); do
              [ -d "reports/$run" ] || continue
              sha="$(cut -c1-12 "reports/$run/.sha" 2>/dev/null || true)"
              wf="$(cat "reports/$run/.workflow" 2>/dev/null || true)"
              printf '<h2>Run <a href="https://github.com/%s/actions/runs/%s">%s</a>' "${{ github.repository }}" "$run" "$run"
              [ -n "$wf" ]  && printf ' &middot; %s' "$wf"
              [ -n "$sha" ] && printf ' &middot; <code>%s</code>' "$sha"
              echo '</h2><ul>'
              for cfg in "reports/$run"/*/; do
                [ -d "$cfg" ] || continue
                name="$(basename "$cfg")"
                printf '<li><a href="%s">%s</a></li>\n' "$cfg" "$name"
              done
              echo '</ul>'
            done
            echo '</body></html>'
          } > index.html
          git add -A
          if git diff --cached --quiet; then
            echo "nothing new to commit"
          else
            git commit -m "reports: ${{ github.workflow }} run ${{ github.run_id }}"
            pushed=false
            for i in 1 2 3 4 5; do
              if git push origin gh-pages; then pushed=true; break; fi
              echo "push rejected, rebasing (attempt $i)"; git pull --rebase origin gh-pages || true; sleep 3
            done
            if [ "$pushed" != true ]; then echo "::error::failed to push reports to gh-pages"; exit 1; fi
          fi
          rm -rf .git
          echo "published=true" >> "$GITHUB_OUTPUT"

      - name: Upload Pages artifact
        if: steps.publish.outputs.published == 'true'
        uses: actions/upload-pages-artifact@v3
        with:
          path: pages

      - name: Deploy to GitHub Pages
        if: steps.publish.outputs.published == 'true'
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Summarize report links
        if: always()
        run: |
          base="https://libffi.github.io/libffi/reports/${{ github.run_id }}"
          {
            echo "## rlgl reports"
            echo ""
            if [ -d incoming ]; then
              for d in incoming/*/; do
                [ -d "$d" ] || continue
                key="$(basename "$d")"; key="${key#rlgl-report-}"
                echo "- [$key]($base/$key/)"
              done
            fi
            echo ""
            echo "All runs: https://libffi.github.io/libffi/"
          } >> "$GITHUB_STEP_SUMMARY"
